<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bingo tygodnia</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0b0b0f">
<link rel="apple-touch-icon" href="img/logo.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
  <header class="top">
    <h1>🎲 Bingo tygodnia</h1>
  <p id="weekInfo" class="muted"></p>
  </header>
<button class="taskbtn" id="taskbtn" aria-label="tygodniowe zadania">🙊 Zadania</button>

<div id="task" class="task" hidden>
  <div id="taskList"></div>
</div>
    <button id="btnCalc" hideen> Kalkulator Punktów </button>
    <br>
  <main>
    <div id="board" class="board" aria-label="Plansza bingo 5 na 5"></div>
    <canvas id="confetti"></canvas>

    <section class="controls">
      <button id="rerollBtn" class="btn">🎲 Reroll kafelka</button>
      <p id="rerollsInfo" class="muted"></p>
      <p id="status" class="status"></p>
      <p class="muted small">
        Plansza zmienia się automatycznie co tydzień.
      </p>
      <p id="goldenCount" class="muted"></p>
    </section>
    </div>
    <footer>@ver1.1.1</footer>
  </main>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
